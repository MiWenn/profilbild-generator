<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#E3000F" />
  <title>Profilbildgenerator &ndash; Dieter Reiter zum OB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ══════════════════════════════════════════════
       RESET & BASE  (mobile-first)
    ══════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --spd-red:  #E3000F;
      --white:    #ffffff;
      --bg:       #f0f0f0;
      --fb:       #1877F2;
      --wa:       #25D366;
      --ig1:      #f09433;
      --ig2:      #bc1888;
      --radius:   6px;
      --shadow:   0 4px 20px rgba(0,0,0,0.14);
    }

    html { font-size: 16px; -webkit-text-size-adjust: 100%; }

    body {
      font-family: 'Open Sans', Arial, sans-serif;
      background: var(--bg);
      min-height: 100dvh;           /* dvh = dynamic viewport height (iOS safe) */
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    /* ══════════════════════════════════════════════
       HEADER
    ══════════════════════════════════════════════ */
    header {
      background: var(--spd-red);
      color: var(--white);
      text-align: center;
      padding: 20px 16px 18px;
      padding-top: max(20px, env(safe-area-inset-top));
    }
    .spd-logo {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .spd-box {
      background: var(--white);
      color: var(--spd-red);
      font-size: 1.7rem;
      font-weight: 800;
      padding: 4px 12px 3px;
      letter-spacing: 1px;
      line-height: 1;
    }
    .spd-claim {
      font-size: 0.82rem;
      font-weight: 700;
      line-height: 1.4;
      text-align: left;
    }
    header h1 {
      font-size: 1.35rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      line-height: 1.2;
    }
    header p.sub {
      margin-top: 4px;
      font-size: 0.88rem;
      font-weight: 700;
      opacity: 0.92;
    }

    /* ══════════════════════════════════════════════
       MAIN WRAPPER
    ══════════════════════════════════════════════ */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px 40px;
      gap: 18px;
      padding-bottom: max(40px, env(safe-area-inset-bottom));
    }

    /* ══════════════════════════════════════════════
       DROP ZONE
    ══════════════════════════════════════════════ */
    #drop-zone {
      display: block;               /* label defaults to inline – override */
      width: 100%;
      max-width: 460px;
      border: 3px dashed #c0c0c0;
      border-radius: var(--radius);
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      background: var(--white);
      transition: border-color .2s, background .2s;
      -webkit-tap-highlight-color: transparent;
    }
    #drop-zone:hover,
    #drop-zone.drag-over {
      border-color: var(--spd-red);
      background: #fff5f5;
    }
    #drop-zone .dz-icon { margin-bottom: 10px; }
    #drop-zone .dz-label {
      font-size: 0.95rem;
      font-weight: 700;
      color: #444;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 14px;
    }
    #drop-zone .dz-btn {
      display: inline-block;
      background: var(--spd-red);
      color: var(--white);
      padding: 12px 28px;
      border-radius: var(--radius);
      font-size: 0.9rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    #file-input { display: none; }

    /* ══════════════════════════════════════════════
       PREVIEW
    ══════════════════════════════════════════════ */
    #preview-wrap {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: 100%;
      max-width: 460px;
    }

    canvas {
      width: 100%;
      height: auto;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: block;
    }

    /* ══════════════════════════════════════════════
       SHARE BUTTONS  (2-column grid, mobile-first)
    ══════════════════════════════════════════════ */
    .share-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
    }

    .share-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      border: none;
      border-radius: var(--radius);
      font-family: 'Open Sans', Arial, sans-serif;
      font-weight: 700;
      font-size: 0.88rem;
      /* Minimum 48px tap target (WCAG) */
      min-height: 48px;
      padding: 10px 12px;
      color: var(--white);
      text-decoration: none;
      line-height: 1.2;
      transition: filter .15s, transform .1s;
      -webkit-tap-highlight-color: transparent;
      cursor: pointer;
    }
    .share-btn:active { transform: scale(0.96); }
    .share-btn:hover  { filter: brightness(0.88); }
    .share-btn svg    { flex-shrink: 0; }

    .btn-download  { background: var(--spd-red); }
    .btn-whatsapp  { background: var(--wa); }
    .btn-facebook  { background: var(--fb); }
    .btn-instagram {
      background: linear-gradient(135deg, var(--ig1) 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, var(--ig2) 100%);
    }

    /* ── Zoom Control ── */
    .zoom-control {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      max-width: 460px;
      padding: 12px;
      background: #fff;
      border-radius: var(--radius);
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .zoom-control label {
      font-size: 0.85rem;
      font-weight: 700;
      color: #444;
      white-space: nowrap;
    }
    .zoom-control input[type="range"] {
      flex: 1;
      min-width: 120px;
      height: 6px;
      border-radius: 3px;
      background: #ddd;
      outline: none;
      -webkit-appearance: none;
    }
    .zoom-control input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--spd-red);
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    .zoom-control input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--spd-red);
      cursor: pointer;
      border: none;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    .zoom-control #zoom-value {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--spd-red);
      min-width: 40px;
      text-align: right;
    }

    /* ── Reset / new photo ── */
    .reset-btn {
      background: none;
      border: none;
      font-family: inherit;
      font-size: 0.82rem;
      color: #888;
      text-decoration: underline;
      cursor: pointer;
      padding: 6px 0;
      min-height: 44px;
    }

    /* ══════════════════════════════════════════════
       PRIVACY NOTE
    ══════════════════════════════════════════════ */
    .privacy {
      font-size: 0.78rem;
      color: #888;
      text-align: center;
      max-width: 360px;
      line-height: 1.6;
    }

    /* ══════════════════════════════════════════════
       INSTAGRAM DESKTOP MODAL
    ══════════════════════════════════════════════ */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 200;
      align-items: flex-end;   /* bottom-sheet on mobile */
      justify-content: center;
      padding: 16px;
      padding-bottom: max(16px, env(safe-area-inset-bottom));
    }
    #modal-overlay.visible { display: flex; }

    .modal {
      background: var(--white);
      border-radius: 14px;
      padding: 26px 22px 22px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .modal h2 {
      font-size: 1.05rem;
      font-weight: 800;
      margin-bottom: 10px;
    }
    .modal p {
      font-size: 0.88rem;
      color: #555;
      line-height: 1.55;
      margin-bottom: 14px;
    }
    .modal-steps {
      text-align: left;
      font-size: 0.85rem;
      color: #444;
      line-height: 2.1;
      margin-bottom: 18px;
    }
    .modal-close {
      background: var(--spd-red);
      color: var(--white);
      border: none;
      border-radius: var(--radius);
      width: 100%;
      min-height: 48px;
      font-family: inherit;
      font-weight: 800;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      cursor: pointer;
    }

    /* ══════════════════════════════════════════════
       FOOTER
    ══════════════════════════════════════════════ */
    footer {
      text-align: center;
      font-size: 0.73rem;
      color: #aaa;
      padding: 14px 16px;
      padding-bottom: max(14px, env(safe-area-inset-bottom));
    }

    /* ══════════════════════════════════════════════
       TABLET / DESKTOP  (min-width: 480px)
    ══════════════════════════════════════════════ */
    @media (min-width: 480px) {
      header h1 { font-size: 1.7rem; }
      header p.sub { font-size: 1rem; }
      .spd-box { font-size: 2rem; }
      main { padding: 28px 24px 52px; gap: 22px; }
      .share-btn { font-size: 0.93rem; padding: 12px 16px; }
      #modal-overlay { align-items: center; }  /* centered on tablet+ */
      .modal { border-radius: 10px; }
    }

    @media (min-width: 640px) {
      header h1 { font-size: 2rem; }
      .share-grid { gap: 12px; }
    }
  </style>
</head>
<body>

<!-- ════════════ HEADER ════════════ -->
<header>
  <div class="spd-logo">
    <span class="spd-box">SPD</span>
    <span class="spd-claim">Soziale<br>Politik f&uuml;r<br>Dich.</span>
  </div>
  <h1>Profilbild-Generator</h1>
  <p class="sub">Stichwahl 22.&nbsp;M&auml;rz &ndash; Dieter Reiter zum&nbsp;OB</p>
</header>

<!-- ════════════ MAIN ════════════ -->
<main>

  <!-- Upload area -->
  <label id="drop-zone" for="file-input">
    <svg class="dz-icon" width="44" height="44" viewBox="0 0 24 24" fill="none"
         stroke="#E3000F" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="1.5"/>
      <circle cx="8.5" cy="8.5" r="1.5"/>
      <polyline points="21 15 16 10 5 21"/>
    </svg>
    <p class="dz-label">Eigenes Profilbild hochladen</p>
    <span class="dz-btn">Foto ausw&auml;hlen</span>
    <input type="file" id="file-input" accept="image/*" />
  </label>

  <!-- Result + share buttons -->
  <div id="preview-wrap">

    <canvas id="canvas" width="800" height="800"></canvas>

    <!-- Zoom Control -->
    <div class="zoom-control">
      <label for="zoom-slider">Bildgr&ouml;&szlig;e anpassen:</label>
      <input type="range" id="zoom-slider" min="50" max="200" value="100" step="5" />
      <span id="zoom-value">100%</span>
    </div>

    <div class="share-grid">

      <!-- Unified Share Button (Native Web Share API) -->
      <button class="share-btn btn-download" onclick="shareToDownload()" style="grid-column: 1 / -1;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 12a8 8 0 0 0 16 0M12 2v10m0 0l-3-3m3 3l3-3"/>
        </svg>
        Teilen & Herunterladen
      </button>

    </div><!-- /.share-grid -->

    <button class="reset-btn" onclick="resetGenerator()">
      &#8592; Anderes Foto w&auml;hlen
    </button>

  </div><!-- /#preview-wrap -->

  <p class="privacy">
    &#128274;&nbsp;Dein Foto wird <strong>nicht</strong> an einen Server &uuml;bertragen.
    Die gesamte Bildbearbeitung findet lokal in deinem Browser statt.
  </p>

</main>


<footer>SPD&nbsp;M&uuml;nchen &middot; Stichwahl&nbsp;22.&nbsp;M&auml;rz&nbsp;2026</footer>

<!-- ════════════ JAVASCRIPT ════════════ -->
<script>
'use strict';

/* ── CONFIG ──────────────────────────────────────── */
const CFG = {
  size:           800,
  circleRadius:   400,
  circleStroke:   100,
  color:          '#E3000F',
  textColor:      '#ffffff',
  font:           '"Open Sans", Arial, sans-serif',
  topText:        'ICH W\u00c4HLE DIETER REITER',
  bottomText:     'AM 22. M\u00c4RZ ZUM OBERB\u00dcRGERMEISTER',
  topSize:        48,
  bottomSize:     40,
  pageUrl:        'https://miwenn.github.io/profilbild-generator/',
  shareText:      'Ich w\u00e4hle Dieter Reiter zum OB! Stichwahl 22. M\u00e4rz in M\u00fcnchen \ud83d\uddf3\ufe0f',
};

/* ── DOM REFS ─────────────────────────────────────── */
const dropZone     = document.getElementById('drop-zone');
const fileInput    = document.getElementById('file-input');
const previewWrap  = document.getElementById('preview-wrap');
const canvas       = document.getElementById('canvas');
const dlBtn        = document.getElementById('download-btn');
const zoomSlider   = document.getElementById('zoom-slider');
const zoomValue    = document.getElementById('zoom-value');
const ctx          = canvas.getContext('2d');

/* ── STATE ──────────────────────────────────────────── */
let currentImage = null;
let photoZoom = 100;
let photoOffsetX = 0;
let photoOffsetY = 0;
let isDragging = false;
let dragStartX = 0;
let dragStartY = 0;
let dragOffsetX = 0;
let dragOffsetY = 0;

/* ── DROP ZONE ────────────────────────────────────── */
// Note: click/keydown handlers removed – the <label for="file-input"> handles
// opening the file picker natively on all browsers including iOS/Android.
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', ()  => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) processFile(f);
});
fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) processFile(fileInput.files[0]);
});

/* ── ZOOM SLIDER ──────────────────────────────────── */
zoomSlider.addEventListener('input', () => {
  photoZoom = parseInt(zoomSlider.value);
  zoomValue.textContent = photoZoom + '%';
  if (currentImage) {
    drawFrame(currentImage);
    dlBtn.href = canvas.toDataURL('image/png');
  }
});

/* ── CANVAS DRAG (MOUSE + TOUCH) ──────────────────── */
function getCanvasCoords(e) {
  const rect = canvas.getBoundingClientRect();
  if (e.touches) {
    return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
  } else {
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  }
}

canvas.addEventListener('mousedown', e => {
  if (!currentImage) return;
  isDragging = true;
  const coords = getCanvasCoords(e);
  dragStartX = coords.x;
  dragStartY = coords.y;
  dragOffsetX = photoOffsetX;
  dragOffsetY = photoOffsetY;
  canvas.style.cursor = 'grabbing';
});

canvas.addEventListener('mousemove', e => {
  if (!isDragging || !currentImage) return;
  const coords = getCanvasCoords(e);
  const deltaX = coords.x - dragStartX;
  const deltaY = coords.y - dragStartY;
  photoOffsetX = dragOffsetX + deltaX;
  photoOffsetY = dragOffsetY + deltaY;
  drawFrame(currentImage);
});

canvas.addEventListener('mouseup', () => {
  isDragging = false;
  canvas.style.cursor = 'grab';
  if (currentImage) dlBtn.href = canvas.toDataURL('image/png');
});

canvas.addEventListener('mouseleave', () => {
  isDragging = false;
  canvas.style.cursor = 'grab';
});

// Touch events (mobile)
canvas.addEventListener('touchstart', e => {
  if (!currentImage) return;
  isDragging = true;
  const coords = getCanvasCoords(e);
  dragStartX = coords.x;
  dragStartY = coords.y;
  dragOffsetX = photoOffsetX;
  dragOffsetY = photoOffsetY;
});

canvas.addEventListener('touchmove', e => {
  if (!isDragging || !currentImage) return;
  e.preventDefault();
  const coords = getCanvasCoords(e);
  const deltaX = coords.x - dragStartX;
  const deltaY = coords.y - dragStartY;
  photoOffsetX = dragOffsetX + deltaX;
  photoOffsetY = dragOffsetY + deltaY;
  drawFrame(currentImage);
});

canvas.addEventListener('touchend', () => {
  isDragging = false;
  if (currentImage) dlBtn.href = canvas.toDataURL('image/png');
});

// Change cursor on canvas hover
canvas.addEventListener('mouseenter', () => {
  if (currentImage && !isDragging) canvas.style.cursor = 'grab';
});

canvas.addEventListener('mouseleave', () => {
  canvas.style.cursor = 'default';
});

/* ── ARROW KEYS ───────────────────────────────────── */
document.addEventListener('keydown', e => {
  if (!currentImage) return;
  const step = 10;  // pixels per key press

  switch (e.key) {
    case 'ArrowUp':
      e.preventDefault();
      photoOffsetY -= step;
      drawFrame(currentImage);
      break;
    case 'ArrowDown':
      e.preventDefault();
      photoOffsetY += step;
      drawFrame(currentImage);
      break;
    case 'ArrowLeft':
      e.preventDefault();
      photoOffsetX -= step;
      drawFrame(currentImage);
      break;
    case 'ArrowRight':
      e.preventDefault();
      photoOffsetX += step;
      drawFrame(currentImage);
      break;
  }
});

/* ── FILE → CANVAS ────────────────────────────────── */
function processFile(file) {
  const reader = new FileReader();
  reader.onload = evt => {
    const img = new Image();
    img.onload = () => {
      currentImage = img;
      photoZoom = 100;
      photoOffsetX = 0;
      photoOffsetY = 0;
      zoomSlider.value = 100;
      zoomValue.textContent = '100%';
      drawFrame(img);
      dropZone.style.display  = 'none';
      previewWrap.style.display = 'flex';
      // scroll into view on mobile
      previewWrap.scrollIntoView({ behavior: 'smooth', block: 'start' });
    };
    img.src = evt.target.result;
  };
  reader.readAsDataURL(file);
}

function resetGenerator() {
  dropZone.style.display    = '';
  previewWrap.style.display = 'none';
  fileInput.value = '';
  currentImage = null;
  photoZoom = 100;
  photoOffsetX = 0;
  photoOffsetY = 0;
  isDragging = false;
  dropZone.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

/* ── DRAW ─────────────────────────────────────────── */
function drawFrame(img) {
  const S = CFG.size;
  const cx = S / 2, cy = S / 2;
  const r = CFG.circleRadius;
  const w = CFG.circleStroke;

  canvas.width = S;
  canvas.height = S;

  // 1. Draw centered photo (constrained to inner circle)
  const innerRadius = r - w / 2;
  const photoMaxSize = innerRadius * 2 * 0.95;  // slight padding

  const imgAspect = img.width / img.height;
  let photoW, photoH;
  if (imgAspect > 1) {
    photoW = photoMaxSize;
    photoH = photoMaxSize / imgAspect;
  } else {
    photoH = photoMaxSize;
    photoW = photoMaxSize * imgAspect;
  }

  // Apply zoom factor
  const zoomFactor = photoZoom / 100;
  photoW *= zoomFactor;
  photoH *= zoomFactor;

  // Apply offset (from drag or manual positioning)
  let photoX = cx - photoW / 2 + photoOffsetX;
  let photoY = cy - photoH / 2 + photoOffsetY;

  ctx.drawImage(img, photoX, photoY, photoW, photoH);

  // 2. Draw red circle (stroke)
  ctx.strokeStyle = CFG.color;
  ctx.lineWidth = w;
  ctx.beginPath();
  ctx.arc(cx, cy, r - w / 2, 0, Math.PI * 2);
  ctx.stroke();

  // 3. Draw curved text (top and bottom, centered)
  drawCurvedTextSegment(CFG.topText, cx, cy, r - w / 2, CFG.topSize, true);
  drawCurvedTextSegment(CFG.bottomText, cx, cy, r - w / 2, CFG.bottomSize, false);
}

function drawCurvedTextSegment(text, centerX, centerY, radius, fontSize, isTop) {
  ctx.save();
  ctx.font = `800 ${fontSize}px ${CFG.font}`;
  ctx.fillStyle = CFG.textColor;

  // Measure total text width to center it
  let totalWidth = 0;
  for (let i = 0; i < text.length; i++) {
    totalWidth += ctx.measureText(text[i]).width;
  }

  const arcAngle = totalWidth / radius;
  const angleOffset = 0;  // No offset - text centered

  // For TOP: text flows from left to right, centered at 0° (TOP in rotation)
  // For BOTTOM: text flows from left to right, centered at 180° (BOTTOM in rotation)
  let startAngle;
  if (isTop) {
    // Top: center at 0°, no offset
    startAngle = 0 - arcAngle / 2;
  } else {
    // Bottom: center at 180°, no offset
    startAngle = Math.PI + arcAngle / 2;
  }

  let currentAngle = startAngle;

  // Draw each character
  for (let i = 0; i < text.length; i++) {
    const char = text[i];
    const charWidth = ctx.measureText(char).width;
    const charAngleSpan = charWidth / radius;

    ctx.save();
    ctx.translate(centerX, centerY);

    // Rotate to position on circle
    if (isTop) {
      ctx.rotate(currentAngle + charAngleSpan / 2);
    } else {
      ctx.rotate(currentAngle - charAngleSpan / 2);
    }

    ctx.translate(0, -radius);

    // Flip bottom text 180° so it reads left-to-right
    if (!isTop) {
      ctx.rotate(Math.PI);
    }

    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,0.2)';
    ctx.shadowBlur = 5;
    ctx.shadowOffsetY = 1;
    ctx.fillText(char, 0, 0);

    ctx.restore();

    // Progress along arc
    if (isTop) {
      currentAngle += charAngleSpan;
    } else {
      currentAngle -= charAngleSpan;
    }
  }

  ctx.restore();
}

/* ── CANVAS → BLOB ───────────────────────────────── */
function canvasToBlob() {
  return new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
}

/* ── NATIVE WEB SHARE ────────────────────────────── */
async function tryNativeShare() {
  if (!navigator.share) return false;
  try {
    const blob = await canvasToBlob();
    const file = new File([blob], 'profilbild-dieter-reiter.png', { type: 'image/png' });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({ files: [file], title: 'Ich w\u00e4hle Dieter Reiter zum OB', text: CFG.shareText });
    } else {
      await navigator.share({ title: 'Ich w\u00e4hle Dieter Reiter zum OB', text: CFG.shareText, url: CFG.pageUrl });
    }
    return true;
  } catch (e) {
    return e.name === 'AbortError'; // user cancelled → treat as success (no fallback needed)
  }
}

/* ── PLATFORM ACTIONS ────────────────────────────── */
async function shareToDownload() {
  if (await tryNativeShare()) return;
  // Fallback: direct download
  const blob = await canvasToBlob();
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'profilbild-dieter-reiter.png';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
</script>
